<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>心靈透視</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; color: #fff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden; user-select: none;
            -webkit-tap-highlight-color: transparent; /* 防止點擊時出現反白框 */
        }
        .screen {
            width: 100%; height: 100%; position: absolute; top: 0; left: 0;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: transform 0.4s ease-in-out;
        }
        #screen1 { transform: translateX(0); }
        #screen2 { transform: translateX(100%); }

        .palm-img { width: 80%; max-width: 300px; margin-bottom: 20px; filter: invert(1); }

        .grid-list {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px 30px;
            text-align: left; font-size: 20px; font-weight: bold; letter-spacing: 1px;
        }

        .category-list { text-align: center; font-size: 20px; line-height: 1.8; width: 85%; }
        .category { margin: 15px 0; padding: 15px; border-radius: 10px; transition: background 0.3s; }
        .category.selected { background-color: rgba(255, 255, 255, 0.2); }
        
        h2 { margin-bottom: 5px; text-decoration: underline; text-underline-offset: 5px; letter-spacing: 3px; font-size: 24px;}
        .sub-text { font-size: 16px; color: #ccc; letter-spacing: 1px;}
        
        /* --- 隱藏的魔術按鈕 --- */
        /* 1. 左上角：獲取推播權限 */
        #btn-permission { position: absolute; top: 0; left: 0; width: 80px; height: 80px; z-index: 999; }
        /* 2. 右上角：中英文切換 */
        #btn-language { position: absolute; top: 0; right: 0; width: 80px; height: 80px; z-index: 999; }
    </style>
</head>
<body>

    <!-- 魔術師秘密開關 -->
    <div id="btn-permission" onclick="requestNotificationPermission()"></div>
    <div id="btn-language" onclick="toggleLanguage()"></div>

    <!-- 畫面 1 -->
    <div id="screen1" class="screen">
        <!-- 圖片區：預設顯示中文版圖片 -->
        <img id="palm-img" src="palm_zh.jpg" alt="Palm" class="palm-img">
        
        <div class="grid-list">
            <div class="lang-text" data-zh="1. 命運" data-en="1. Destiny">1. 命運</div>   
            <div class="lang-text" data-zh="7. 事業" data-en="7. Career">7. 事業</div>
            
            <div class="lang-text" data-zh="2. 夢想" data-en="2. Dreams">2. 夢想</div>    
            <div class="lang-text" data-zh="8. 冒險" data-en="8. Adventure">8. 冒險</div>
            
            <div class="lang-text" data-zh="3. 恐懼" data-en="3. Fears">3. 恐懼</div>     
            <div class="lang-text" data-zh="9. 氣場" data-en="9. Aura">9. 氣場</div>
            
            <div class="lang-text" data-zh="4. 浪漫" data-en="4. Romance">4. 浪漫</div>   
            <div class="lang-text" data-zh="10. 健康" data-en="10. Wellness">10. 健康</div>
            
            <div class="lang-text" data-zh="5. 野心" data-en="5. Ambition">5. 野心</div>  
            <div class="lang-text" data-zh="11. 友誼" data-en="11. Friendship">11. 友誼</div>
            
            <div class="lang-text" data-zh="6. 熱情" data-en="6. Passion">6. 熱情</div>   
            <div class="lang-text" data-zh="12. 創意" data-en="12. Creativity">12. 創意</div>
        </div>
        <p class="lang-text" data-zh="(向左滑動進入下一步)" data-en="(Swipe Left)" style="color:#666; font-size:14px; margin-top:30px;">
            (向左滑動進入下一步)
        </p>
    </div>

    <!-- 畫面 2 -->
    <div id="screen2" class="screen">
        <div class="category-list">
            <div class="category" data-value="8" onclick="toggleCategory(this)">
                <h2 class="lang-text" data-zh="事業線" data-en="FATE">宿命</h2>
                <div class="sub-text lang-html" data-zh="冒險 - 氣場 - 健康<br>友誼 - 創意" data-en="Adventure - Aura - Wellness<br>Friendship - Creativity">
                    冒險 - 氣場 - 健康<br>友誼 - 創意
                </div>
            </div>
            <div class="category" data-value="4" onclick="toggleCategory(this)">
                <h2 class="lang-text" data-zh="生命線" data-en="LIFE">人生</h2>
                <div class="sub-text lang-html" data-zh="浪漫 - 野心 - 熱情<br>事業 - 創意" data-en="Romance - Ambition - Passion<br>Career - Creativity">
                    浪漫 - 野心 - 熱情<br>事業 - 創意
                </div>
            </div>
            <div class="category" data-value="2" onclick="toggleCategory(this)">
                <h2 class="lang-text" data-zh="感情線" data-en="HEART">內心</h2>
                <div class="sub-text lang-html" data-zh="夢想 - 恐懼 - 熱情<br>事業 - 健康 - 友誼" data-en="Dreams - Fears - Passion<br>Career - Wellness - Friendship">
                    夢想 - 恐懼 - 熱情<br>事業 - 健康 - 友誼
                </div>
            </div>
            <div class="category" data-value="1" onclick="toggleCategory(this)">
                <h2 class="lang-text" data-zh="智慧線" data-en="HEAD">理智</h2>
                <div class="sub-text lang-html" data-zh="命運 - 恐懼 - 野心<br>事業 - 氣場 - 友誼" data-en="Destiny - Fears - Ambition<br>Career - Aura - Friendship">
                    命運 - 恐懼 - 野心<br>事業 - 氣場 - 友誼
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 字典：包含中英雙語，推播時會根據當前語言發送對應的文字 ---
        const dictionary = {
            zh: {
                1: "命運", 2: "夢想", 3: "恐懼", 4: "浪漫", 5: "野心", 6: "熱情", 
                7: "事業", 8: "冒險", 9: "氣場", 10: "健康", 11: "友誼", 12: "創意"
            },
            en: {
                1: "Destiny", 2: "Dreams", 3: "Fears", 4: "Romance", 5: "Ambition", 6: "Passion", 
                7: "Career", 8: "Adventure", 9: "Aura", 10: "Wellness", 11: "Friendship", 12: "Creativity"
            }
        };

        // --- 預設狀態 ---
        let currentLang = 'zh'; // 預設為中文
        let totalScore = 0;
        let isSent = false;

        // --- PWA Service Worker ---
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        // --- 魔術師專用：獲取通知權限 (點擊左上角) ---
        function requestNotificationPermission() {
            if ('Notification' in window) {
                Notification.requestPermission().then(permission => {
                    if (permission === 'granted') {
                        // 稍微震動+閃爍作為成功提示
                        if(navigator.vibrate) navigator.vibrate(50);
                        document.body.style.backgroundColor = '#222';
                        setTimeout(() => document.body.style.backgroundColor = '#000', 150);
                    }
                });
            }
        }

        // --- 魔術師專用：中英文無縫切換 (點擊右上角) ---
        function toggleLanguage() {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            
            // 1. 切換手相圖片
            document.getElementById('palm-img').src = currentLang === 'zh' ? 'palm_zh.jpg' : 'palm_en.jpg';

            // 2. 切換純文字內容
            document.querySelectorAll('.lang-text').forEach(el => {
                el.innerText = el.getAttribute(`data-${currentLang}`);
            });

            // 3. 切換含排版(br)的文字內容
            document.querySelectorAll('.lang-html').forEach(el => {
                el.innerHTML = el.getAttribute(`data-${currentLang}`);
            });

            // 4. 魔術師秘密回饋：手機輕微震動一下，讓你知道切換成功了，不需要盯著螢幕看
            if(navigator.vibrate) navigator.vibrate(30);
            
            // 畫面輕微閃爍回饋
            document.body.style.backgroundColor = '#111';
            setTimeout(() => document.body.style.backgroundColor = '#000', 100);
        }

        // --- 滑動切換畫面 ---
        let startX = 0;
        document.addEventListener('touchstart', e => startX = e.changedTouches[0].screenX);
        document.addEventListener('touchend', e => {
            let endX = e.changedTouches[0].screenX;
            if (startX - endX > 50) {
                document.getElementById('screen1').style.transform = 'translateX(-100%)';
                document.getElementById('screen2').style.transform = 'translateX(0)';
            } else if (endX - startX > 50) {
                document.getElementById('screen1').style.transform = 'translateX(0)';
                document.getElementById('screen2').style.transform = 'translateX(100%)';
            }
        });

        // --- 點擊分類計分 ---
        function toggleCategory(element) {
            let val = parseInt(element.getAttribute('data-value'));
            if (element.classList.contains('selected')) {
                element.classList.remove('selected');
                totalScore -= val;
            } else {
                element.classList.add('selected');
                totalScore += val;
            }
        }

        // --- 鎖定螢幕(進入背景) 觸發推播 ---
        document.addEventListener("visibilitychange", () => {
            if (document.hidden && totalScore > 0 && !isSent) {
                // 會根據目前的語言去抓單字 (例如中文模式會抓"夢想"，英文模式會抓"Dreams")
                let finalWord = dictionary[currentLang][totalScore] || (currentLang === 'zh' ? "未知" : "Unknown");
                
                if (navigator.serviceWorker) {
                    navigator.serviceWorker.ready.then(registration => {
                        registration.showNotification("💡", {
                            body: finalWord,
                            vibrate: [200, 100, 200],
                            badge: "icon.png"
                        });
                    });
                }
                isSent = true; 
            }
        });
    </script>
</body>
</html>
