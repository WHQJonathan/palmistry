<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>心靈透視</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; color: #fff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden; user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .screen {
            width: 100%; height: 100%; position: absolute; top: 0; left: 0;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: transform 0.4s ease-in-out;
        }
        #screen1 { transform: translateX(0); }
        #screen2 { transform: translateX(100%); }

        .palm-img { width: 80%; max-width: 300px; margin-bottom: 20px; filter: invert(1); }

        .grid-list {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px 30px;
            text-align: left; font-size: 20px; font-weight: bold; letter-spacing: 1px;
        }

        .category-list { text-align: center; font-size: 20px; line-height: 1.8; width: 85%; }
        .category { margin: 10px 0; padding: 15px; border-radius: 10px; transition: background 0.3s; }
        .category.selected { background-color: rgba(255, 255, 255, 0.2); }
        
        h2 { margin-bottom: 5px; text-decoration: underline; text-underline-offset: 5px; letter-spacing: 3px; font-size: 22px;}
        .sub-text { font-size: 14px; color: #ccc; letter-spacing: 1px;}
        
        .submit-btn {
            margin-top: 15px; padding: 12px 40px; border-radius: 30px;
            background-color: #333; color: #fff; font-size: 18px; font-weight: bold;
            letter-spacing: 2px; border: 1px solid #555; transition: 0.3s;
        }
        .submit-btn:active { background-color: #fff; color: #000; }

        #btn-permission { position: absolute; top: 0; left: 0; width: 80px; height: 80px; z-index: 999; }
        #btn-language { position: absolute; top: 0; right: 0; width: 80px; height: 80px; z-index: 999; }

        /* 🎩 瞬間視覺遮罩 */
        #black-screen {
            display: none; 
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: #000; 
            z-index: 10000; 
            cursor: none;
        }
    </style>
</head>
<body>

    <!-- 視覺緩衝遮罩 -->
    <div id="black-screen"></div>

    <div id="btn-permission" onclick="requestNotificationPermission()"></div>
    <div id="btn-language" onclick="toggleLanguage()"></div>

    <!-- 畫面 1 -->
    <div id="screen1" class="screen">
        <img id="palm-img" src="palm_zh.jpg" alt="Palm" class="palm-img">
        <div class="grid-list">
            <div class="lang-text" data-zh="1. 命運" data-en="1. Destiny">1. 命運</div>   
            <div class="lang-text" data-zh="7. 事業" data-en="7. Career">7. 事業</div>
            <div class="lang-text" data-zh="2. 夢想" data-en="2. Dreams">2. 夢想</div>    
            <div class="lang-text" data-zh="8. 冒險" data-en="8. Adventure">8. 冒險</div>
            <div class="lang-text" data-zh="3. 恐懼" data-en="3. Fears">3. 恐懼</div>     
            <div class="lang-text" data-zh="9. 氣場" data-en="9. Aura">9. 氣場</div>
            <div class="lang-text" data-zh="4. 浪漫" data-en="4. Romance">4. 浪漫</div>   
            <div class="lang-text" data-zh="10. 健康" data-en="10. Wellness">10. 健康</div>
            <div class="lang-text" data-zh="5. 野心" data-en="5. Ambition">5. 野心</div>  
            <div class="lang-text" data-zh="11. 友誼" data-en="11. Friendship">11. 友誼</div>
            <div class="lang-text" data-zh="6. 熱情" data-en="6. Passion">6. 熱情</div>   
            <div class="lang-text" data-zh="12. 創意" data-en="12. Creativity">12. 創意</div>
        </div>
        <p class="lang-text" data-zh="(向左滑動進入下一步)" data-en="(Swipe Left)" style="color:#666; font-size:14px; margin-top:30px;">
            (向左滑動進入下一步)
        </p>
    </div>

    <!-- 畫面 2 -->
    <div id="screen2" class="screen">
        <div class="category-list">
            <div class="category" data-value="8" onclick="toggleCategory(this)">
                <h2 class="lang-text" data-zh="事業線" data-en="FATE">事業線</h2>
                <div class="sub-text lang-html" data-zh="冒險 - 氣場 - 健康<br>友誼 - 創意" data-en="Adventure - Aura - Wellness<br>Friendship - Creativity">冒險 - 氣場 - 健康<br>友誼 - 創意</div>
            </div>
            <div class="category" data-value="4" onclick="toggleCategory(this)">
                <h2 class="lang-text" data-zh="生命線" data-en="LIFE">生命線</h2>
                <div class="sub-text lang-html" data-zh="浪漫 - 野心 - 熱情<br>事業 - 創意" data-en="Romance - Ambition - Passion<br>Career - Creativity">浪漫 - 野心 - 熱情<br>事業 - 創意</div>
            </div>
            <div class="category" data-value="2" onclick="toggleCategory(this)">
                <h2 class="lang-text" data-zh="感情線" data-en="HEART">感情線</h2>
                <div class="sub-text lang-html" data-zh="夢想 - 恐懼 - 熱情<br>事業 - 健康 - 友誼" data-en="Dreams - Fears - Passion<br>Career - Wellness - Friendship">夢想 - 恐懼 - 熱情<br>事業 - 健康 - 友誼</div>
            </div>
            <div class="category" data-value="1" onclick="toggleCategory(this)">
                <h2 class="lang-text" data-zh="智慧線" data-en="HEAD">智慧線</h2>
                <div class="sub-text lang-html" data-zh="命運 - 恐懼 - 野心<br>事業 - 氣場 - 友誼" data-en="Destiny - Fears - Ambition<br>Career - Aura - Friendship">命運 - 恐懼 - 野心<br>事業 - 氣場 - 友誼</div>
            </div>
        </div>
        
        <div class="submit-btn lang-text" data-zh="🔒 鎖定送出" data-en="🔒 Lock & Submit" onclick="triggerMagic()">🔒 鎖定送出</div>
    </div>

    <script>
        const targetShortcutName = "MagicTrigger"; 

        const dictionary = {
            zh: { 1: "命運", 2: "夢想", 3: "恐懼", 4: "浪漫", 5: "野心", 6: "熱情", 7: "事業", 8: "冒險", 9: "氣場", 10: "健康", 11: "友誼", 12: "創意" },
            en: { 1: "Destiny", 2: "Dreams", 3: "Fears", 4: "Romance", 5: "Ambition", 6: "Passion", 7: "Career", 8: "Adventure", 9: "Aura", 10: "Wellness", 11: "Friendship", 12: "Creativity" }
        };

        let currentLang = 'zh'; 
        let totalScore = 0;
        let isSent = false;

        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');

        function requestNotificationPermission() {
            if ('Notification' in window) {
                Notification.requestPermission().then(permission => {
                    if (permission === 'granted') {
                        if(navigator.vibrate) navigator.vibrate(50);
                        document.body.style.backgroundColor = '#222'; setTimeout(() => document.body.style.backgroundColor = '#000', 150);
                    }
                });
            }
        }

        function toggleLanguage() {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            document.getElementById('palm-img').src = currentLang === 'zh' ? 'palm_zh.jpg' : 'palm_en.jpg';
            document.querySelectorAll('.lang-text').forEach(el => el.innerText = el.getAttribute(`data-${currentLang}`));
            document.querySelectorAll('.lang-html').forEach(el => el.innerHTML = el.getAttribute(`data-${currentLang}`));
            if(navigator.vibrate) navigator.vibrate(30);
            document.body.style.backgroundColor = '#111'; setTimeout(() => document.body.style.backgroundColor = '#000', 100);
        }

        let startX = 0;
        document.addEventListener('touchstart', e => startX = e.changedTouches[0].screenX);
        document.addEventListener('touchend', e => {
            let endX = e.changedTouches[0].screenX;
            if (startX - endX > 50) {
                document.getElementById('screen1').style.transform = 'translateX(-100%)';
                document.getElementById('screen2').style.transform = 'translateX(0)';
            } else if (endX - startX > 50) {
                document.getElementById('screen1').style.transform = 'translateX(0)';
                document.getElementById('screen2').style.transform = 'translateX(100%)';
            }
        });

        function toggleCategory(element) {
            let val = parseInt(element.getAttribute('data-value'));
            if (element.classList.contains('selected')) {
                element.classList.remove('selected'); totalScore -= val;
            } else {
                element.classList.add('selected'); totalScore += val;
            }
        }

        // ==========================================
        // 🔮 終極觸發：確保黑屏先出現，再叫出捷徑
        // ==========================================
        function triggerMagic() {
            if (totalScore === 0 || isSent) return; 
            
            let finalWord = dictionary[currentLang][totalScore] || (currentLang === 'zh' ? "未知" : "Unknown");
            
            // 1. 網頁瞬間變黑 (視覺遮蔽)
            document.getElementById('black-screen').style.display = 'block';

            // 2. 瞬間發推播給手錶
            if (navigator.serviceWorker && navigator.serviceWorker.controller) {
                navigator.serviceWorker.ready.then(registration => {
                    registration.showNotification("💡", { body: finalWord, vibrate: [200, 100, 200], badge: "icon.png" });
                });
            }

            // 3. 【關鍵修正】等待 0.5 秒 (500毫秒)，確保瀏覽器已經把黑畫面渲染出來了，再去呼叫捷徑！
            setTimeout(() => {
                if (targetShortcutName && targetShortcutName.trim() !== "") {
                    let shortcutUrl = `shortcuts://run-shortcut?name=${encodeURIComponent(targetShortcutName)}&input=text&text=${encodeURIComponent(finalWord)}`;
                    window.location.href = shortcutUrl; 
                }
            }, 500); 

            isSent = true;
        }
    </script>
</body>
</html>
